<!DOCTYPE html>
<html lang="uk">
  <head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
    <title>BudCon</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Unbounded:wght@700;800&family=JetBrains+Mono:wght@500;600;700;800&family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
    <style>
      *{margin:0;padding:0;box-sizing:border-box;}
      html,body{
        background:#000000;color:#ffffff;font-family:'Manrope',system-ui,sans-serif;
        background-image:
          linear-gradient(rgba(255,255,255,0.025) 1px, transparent 1px),
          linear-gradient(90deg, rgba(255,255,255,0.025) 1px, transparent 1px);
        background-size: 24px 24px;
        background-attachment: fixed;
      }
      input,select,button,textarea{font-family:'Manrope',system-ui,sans-serif;}
      input[type=date]::-webkit-calendar-picker-indicator{filter:invert(1);}
      input,select,textarea{color-scheme:dark;}
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
