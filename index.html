<!DOCTYPE html>
<html lang="uk">
  <head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
    <title>BudCon</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script>
      // Застосовуємо збережену тему ДО першої відмальовки — щоб не блимало світлим при завантаженні
      try {
        var savedTheme = localStorage.getItem('budcon_theme') || 'light';
        document.documentElement.setAttribute('data-theme', savedTheme);
      } catch (e) {}
    </script>
    <style>
      *{margin:0;padding:0;box-sizing:border-box;}

      /* ── Світла тема (за замовчуванням) ── */
      html{
        --bg:        #F2F4F7;
        --card:      #FFFFFF;
        --border:    #E5E7EB;
        --border2:   #EEF0F3;
        --text:      #0F172A;
        --dim:       #6B7280;
        --muted:     #9CA3AF;
        --blue:      #3B82F6;
        --blueDark:  #2563EB;
        --blueSoft:  #EFF4FF;
        --blueSoft2: #DCE8FF;
        --green:     #16A34A;
        --greenSoft: #F0FDF4;
        --red:       #EF4444;
        --redSoft:   #FEF2F2;
        --gray:      #F3F4F6;
      }

      /* ── Темна тема ── */
      html[data-theme="dark"]{
        --bg:        #0B0F14;
        --card:      #161B22;
        --border:    #2A313C;
        --border2:   #1E242C;
        --text:      #F1F5F9;
        --dim:       #94A3B8;
        --muted:     #64748B;
        --blue:      #4C8DFF;
        --blueDark:  #3B7CFF;
        --blueSoft:  rgba(76,141,255,0.16);
        --blueSoft2: rgba(76,141,255,0.30);
        --green:     #34D399;
        --greenSoft: rgba(52,211,153,0.15);
        --red:       #F87171;
        --redSoft:   rgba(248,113,113,0.15);
        --gray:      #1B2129;
      }

      html,body{
        background:var(--bg);color:var(--text);
        font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,system-ui,sans-serif;
        transition: background-color .2s, color .2s;
      }
      input,select,button,textarea{font-family:inherit;}
      input[type=date]::-webkit-calendar-picker-indicator{opacity:0.6;}
      html[data-theme="dark"] input[type=date]::-webkit-calendar-picker-indicator{filter:invert(1);opacity:0.7;}
      button{-webkit-tap-highlight-color:transparent;}
      input,select,textarea{color-scheme: light dark;}
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
